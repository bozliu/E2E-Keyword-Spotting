name: ci

on:
  push:
    branches:
      - main
      - legacy-v1
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system audio deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install CPU torch wheels
        run: python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu "torch>=2.5,<2.7" "torchaudio>=2.5,<2.7"
      - name: Install package
        run: python -m pip install -e . pytest "gradio>=5.20,<6"
      - name: Run focused tests
        run: pytest -q tests/test_demo*.py tests/test_keyword_focus*.py tests/test_prepare_speech_commands.py
      - name: Check helper entrypoints
        run: |
          python scripts/prepare_speech_commands.py --help
          python -m kws.eval --help
          python -m kws.demo.realtime --help
