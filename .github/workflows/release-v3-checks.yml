name: release-v3-checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  core-release-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: dl
          environment-file: environment.yml
          auto-activate-base: false
          python-version: "3.12"

      - name: Install package
        shell: bash -l {0}
        run: |
          conda run -n dl python -m pip install -e . pytest "gradio>=5.20,<6"

      - name: Syntax checks
        shell: bash -l {0}
        run: |
          conda run -n dl python -m py_compile \
            app.py \
            scripts/generate_release_assets.py \
            src/kws/benchmark_external.py \
            src/kws/demo/realtime.py \
            src/kws/demo/validate_realtime.py

      - name: Run release test subset
        shell: bash -l {0}
        run: |
          conda run --no-capture-output -n dl pytest -q \
            tests/test_external_hf_kws.py \
            tests/test_demo_accuracy_first.py \
            tests/test_validate_realtime.py \
            tests/test_demo_analyze_checkpoint.py \
            tests/test_eval_cli.py \
            tests/test_demo_web.py \
            tests/test_training_smoke.py

      - name: Validate checked-in public release assets
        shell: bash -l {0}
        run: |
          conda run --no-capture-output -n dl python - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path("README.md"),
              Path("docs/assets/per_class_valid_test.png"),
              Path("docs/assets/latency_vs_accuracy.png"),
              Path("docs/assets/realtime_accuracy_first_demo.gif"),
              Path("docs/assets/data/release_summary_v3.json"),
              Path("docs/assets/data/self_benchmark_v3.json"),
              Path("docs/assets/data/version_comparison_v1_v2_v3.json"),
              Path("docs/assets/data/sota_reference_table.json"),
              Path("docs/assets/data/realtime_status.json"),
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit(f"Missing public release assets: {missing}")
          summary = json.loads(Path("docs/assets/data/release_summary_v3.json").read_text(encoding="utf-8"))
          if summary["headline"]["model"] != "ensemble/ast-superb-kws12":
              raise SystemExit("Unexpected release summary headline model")
          print("checked-in release assets look consistent")
          PY

      - name: Upload release asset previews
        uses: actions/upload-artifact@v4
        with:
          name: v3-release-assets
          path: |
            docs/assets/
