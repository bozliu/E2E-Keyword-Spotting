seed: 1337
run_name: quick_mhatt

model:
  name: mhatt_crnn
  conv_channels: 32
  gru_hidden: 128
  gru_layers: 2
  num_heads: 4
  dropout: 0.20

features:
  sample_rate: 16000
  audio_seconds: 1.0
  n_fft: 1024
  hop_length: 128
  n_mels: 80
  f_min: 20.0
  f_max: 7600.0

data:
  manifests_dir: data/processed/manifests
  local:
    speech_commands_split: data/local/speech_commands_split
    silence_ratio: 0.10
    limit_per_class: 320
    optional_test_mirror: data/optional/speech_commands_mirror
  external:
    hi_mia:
      enabled: true
      root: data/external/hi_mia
      limit_per_split: 2500

training:
  device: auto
  output_dir: outputs
  epochs: 5
  batch_size: 128
  num_workers: 0
  augment: true
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  lr_gamma: 0.5
  lr_patience: 1
  loss_weights:
    command: 1.0
    wake: 1.0
    aux: 0.05
  aux_margin: 0.2
