seed: 1337
run_name: smoke_mhatt

model:
  name: mhatt_crnn
  conv_channels: 24
  gru_hidden: 96
  gru_layers: 2
  num_heads: 4
  dropout: 0.20

features:
  sample_rate: 16000
  audio_seconds: 1.0
  n_fft: 512
  hop_length: 128
  n_mels: 64
  f_min: 20.0
  f_max: 7600.0

data:
  manifests_dir: data/processed/manifests
  local:
    speech_commands_split: data/local/speech_commands_split
    silence_ratio: 0.10
    limit_per_class: 8
    xiaomi_mirror: data/legacy/KWS/XiaoMi/speech_commands
  external:
    hi_mia:
      enabled: true
      root: data/external/hi_mia
      limit_per_split: 120

training:
  device: auto
  output_dir: outputs
  epochs: 1
  batch_size: 64
  num_workers: 0
  augment: true
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  lr_gamma: 0.5
  lr_patience: 1
  loss_weights:
    command: 1.0
    wake: 1.0
    aux: 0.02
  aux_margin: 0.2
